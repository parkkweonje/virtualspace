<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>결제 실패 | 사주꿈</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
  <style>
    body{margin:0;min-height:100vh;display:grid;place-items:center;background:#0d0b1f;color:#efe9ff;
      font-family:'Pretendard',system-ui,sans-serif;text-align:center;padding:24px}
    h1{font-size:1.3rem;color:#e8615a;margin:0 0 8px}
    p{color:#a99ec9}
    a{display:inline-block;margin-top:18px;padding:12px 22px;border-radius:12px;font-weight:800;
      color:#1a1440;background:linear-gradient(100deg,#f5c451,#e0a83a);text-decoration:none}
  </style>
</head>
<body>
  <div>
    <h1 id="t">결제가 취소되었습니다</h1>
    <p id="m">다시 시도하시려면 홈으로 돌아가 주세요.</p>
    <a id="b" href="/">홈으로 돌아가기</a>
  </div>
  <script>
    (function(){
      var q=new URLSearchParams(location.search), msg=q.get('message');
      var lang=null; try{lang=localStorage.getItem('sk_lang');}catch(e){}
      var T={en:{t:'Payment was cancelled',m:'Please go back home to try again.',b:'Back to home'},
        ja:{t:'決済がキャンセルされました',m:'もう一度お試しにはホームへお戻りください。',b:'ホームへ戻る'},
        zh:{t:'支付已取消',m:'如需重试，请返回首页。',b:'返回首页'}};
      if(T[lang]){document.getElementById('t').textContent=T[lang].t;
        document.getElementById('m').textContent=T[lang].m;document.getElementById('b').textContent=T[lang].b;}
      if(msg){document.getElementById('m').textContent=msg;}
    })();
  </script>
</body>
</html>
